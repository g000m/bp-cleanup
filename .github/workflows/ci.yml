name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2

      - name: Composer validate
        run: composer validate --no-interaction --strict

      - name: PHP lint
        run: |
          php -l bp-cleanup.php
          php -l uninstall.php
          php -l includes/class-cli-command.php
          php -l includes/class-cron-scheduler.php
          php -l includes/class-purge-engine.php
          php -l includes/class-purge-logger.php
