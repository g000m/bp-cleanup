name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: >-
      ${
        (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main') ||
        (github.event_name == 'workflow_dispatch')
      }
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer:v2

      - name: Read versions
        id: versions
        run: |
          set -euo pipefail
          plugin_version=$(grep -E "^\s*\* Version:" bp-cleanup.php | head -n1 | sed -E 's/.*Version:\s*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "plugin_version=${plugin_version}" >> "$GITHUB_OUTPUT"

      - name: Guard release conditions
        id: guard
        run: |
          set -euo pipefail
          plugin_version="${{ steps.versions.outputs.plugin_version }}"

          if [ -z "$plugin_version" ]; then
            echo "Missing version in bp-cleanup.php." >&2
            exit 1
          fi

          if ! [[ "$plugin_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Pre-release or invalid version detected ($plugin_version); skipping release."
            echo "release_ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -n "$latest_tag" ]; then
            latest_version="${latest_tag#v}"
            if [ "$latest_version" = "$plugin_version" ]; then
              echo "Version $plugin_version already released as $latest_tag; skipping."
              echo "release_ok=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$(printf '%s\n' "$latest_version" "$plugin_version" | sort -V | tail -n1)" != "$plugin_version" ]; then
              echo "Version $plugin_version is not greater than latest tag $latest_tag; skipping."
              echo "release_ok=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "release_ok=true" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.guard.outputs.release_ok == 'true'
        run: |
          set -euo pipefail
          version="${{ steps.versions.outputs.plugin_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${version}" -m "Release v${version}"
          git push origin "v${version}"

      - name: Install dependencies
        if: steps.guard.outputs.release_ok == 'true'
        run: |
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Build release zip
        if: steps.guard.outputs.release_ok == 'true'
        run: |
          set -euo pipefail
          version="${{ steps.versions.outputs.plugin_version }}"
          mkdir -p build/bp-cleanup dist
          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'local_tests/' \
            --exclude 'tests/' \
            --exclude '.DS_Store' \
            ./ build/bp-cleanup/
          (cd build && zip -r "../dist/bp-cleanup-${version}.zip" bp-cleanup)

      - name: Publish GitHub release
        if: steps.guard.outputs.release_ok == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versions.outputs.plugin_version }}
          name: BP Cleanup v${{ steps.versions.outputs.plugin_version }}
          generate_release_notes: true
          files: dist/bp-cleanup-${{ steps.versions.outputs.plugin_version }}.zip
